name: preprocess-dataset

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run automated preprocessing
        run: |
          python preprocessing/automate_Nama-siswa.py                 --input_path namadataset_raw/credit_scoring_raw.csv                 --output_path preprocessing/namadataset_preprocessing/credit_scoring_preprocessing.csv

      - name: Upload preprocessing artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataset-preprocessing
          path: preprocessing/namadataset_preprocessing/credit_scoring_preprocessing.csv
